version: "3.9"

services:
  # Docker Engine; same jenkins_home mount so `docker run -v /var/jenkins_home/workspace/...` resolves on the daemon.
  dockerdind:
    image: docker:dind
    container_name: jenkins_terraform_dind
    privileged: true
    restart: unless-stopped
    environment:
      DOCKER_TLS_CERTDIR: ""
    volumes:
      - ./jenkins/jenkins_home:/var/jenkins_home
      - dind-data:/var/lib/docker
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 5s
      timeout: 5s
      retries: 6
      start_period: 15s

  jenkins:
    build: ./jenkins
    container_name: jenkins_terraform
    depends_on:
      dockerdind:
        condition: service_healthy
    ports:
      - "$J_HTTP_PORT:$J_HTTP_PORT"
      - "50000:50000"
    volumes:
      - ./jenkins/jenkins_home:/var/jenkins_home
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
      - JENKINS_OPTS="--httpPort=${J_HTTP_PORT}"
      - DOCKER_HOST=tcp://dockerdind:2375
    restart: unless-stopped

  gitea:
    image: gitea/gitea:1.25
    container_name: gitea
    environment:
      # Prevent UI setup wizard
      - GITEA__security__INSTALL_LOCK=true

      # Database config (required)
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__database__PATH=/data/gitea/gitea.db

      # Server settings
      - GITEA__server__DOMAIN=localhost
      - GITEA__server__ROOT_URL=http://localhost:$G_HTTP_PORT/
      - GITEA__server__HTTP_PORT=$G_HTTP_PORT

      # Admin user (optional if using API / curl later)
      - G_USER=$G_USER
      - G_PASS=$G_PASS
      - G_EMAIL=$G_EMAIL
      - G_REPO_NAME=$G_REPO_NAME
    ports:
      - "$G_HTTP_PORT:$G_HTTP_PORT"
      - "2222:22"
    volumes:
      - ./gitea/init.sh:/init.sh
      - ./gitea/entrypoint.sh:/entrypoint.sh
    command: ["sh", "/entrypoint.sh"]

volumes:
  dind-data:
